name: flake-check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-configurations:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: wsl
            arch: x86_64
            os: ubuntu-latest
          - host: shanghai
            arch: x86_64
            os: ubuntu-latest
          - host: x470
            arch: x86_64
            os: ubuntu-latest
          - host: tank
            arch: x86_64
            os: ubuntu-latest
          - host: h610
            arch: x86_64
            os: ubuntu-latest
          - host: gpd
            arch: x86_64
            os: ubuntu-latest
          - host: m16
            arch: x86_64
            os: ubuntu-latest

          - host: r2s
            arch: aarch64
            os: ubuntu-latest
          - host: r5sjp
            arch: aarch64
            os: ubuntu-latest
          - host: r5s
            arch: aarch64
            os: ubuntu-latest
          - host: r6s
            arch: aarch64
            os: ubuntu-latest
          - host: aarch64-wsl
            arch: aarch64
            os: ubuntu-latest
          - host: rpi4
            arch: aarch64
            os: ubuntu-latest

          - host: m1elite
            arch: aarch64-darwin
            os: macos-latest
          - host: m1pro
            arch: aarch64-darwin
            os: macos-latest

    name: Check ${{ matrix.host }} (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Linux runners: the classic installer is proven for these jobs.
      - name: Install Nix (Linux)
        if: runner.os == 'Linux'
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            ${{ matrix.arch == 'aarch64' && 'extra-platforms = aarch64-linux' || '' }}

      # macOS runners ship a build group / _nixbld users, which makes the
      # classic installer abort with eDSRecordAlreadyExists. The Determinate
      # installer handles pre-existing installs cleanly.
      - name: Install Nix (macOS)
        if: runner.os == 'macOS'
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build (Dry Run)
        run: |
          echo "Checking configuration for host: ${{ matrix.host }}..."
          if [ "${{ runner.os }}" = "macOS" ]; then
            nix build .#darwinConfigurations.${{ matrix.host }}.system --dry-run
          else
            nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --dry-run
          fi
