keys:
  # admin keys: derived from each machine's ~/.ssh/id_ed25519 via ssh-to-age;
  # private half lives on that machine at ~/.config/sops/age/keys.txt
  # (regenerate: ssh-to-age -private-key -i ~/.ssh/id_ed25519)
  - &hank_hackintosh age1xeeg8yu74aqn5x0vzevsuxmsd4nem3cfw2gjwc82ke4mjvep3pxq5p99lh
  - &hank_m1elite age1uumwl2zvv6sk2yysjtd29yfffjj8xfus6z95eu0ftxt40mnyh9aq3g5f2c
  - &hank1 age1zzwv2edh2ssz7xpmpcqr73rkh79j4mwjy50ap8dvm4c64ksmspxsz7mnat
  - &hank2 age175594x5r5ngze8rs5n2ga0976e0flh0xq2aqjq3xaldr28e703sqlcy9n6
  - &hank3 age1f0ch7vfsqs3u5c4mzqs4m228wge5vulz0s0yj30gkapk7nlk3g2s43x42l
  # extra admins: ed25519 pubkeys converted via ssh-to-age
