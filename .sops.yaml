  - &host_rpi4 age1lghdzjwhlwssu44ptp5853e48fy0pcxrxlpf4r7ruphplxna4vzqq6e2kh

creation_rules:
  - path_regex: secrets/hosts/shanghai\.yaml$
    key_groups:
      - age: [*hank_hackintosh, *hank_m1elite, *hank1, *hank2, *hank3, *linwhite, *fendada, *kenneth, *host_shanghai]
  - path_regex: secrets/hosts/h610\.yaml$
    key_groups:
      - age: [*hank_hackintosh, *hank_m1elite, *hank1, *hank2, *hank3, *linwhite, *fendada, *kenneth, *host_h610]
  - path_regex: secrets/hosts/r6s\.yaml$
    key_groups:
      - age: [*hank_hackintosh, *hank_m1elite, *hank1, *hank2, *hank3, *linwhite, *fendada, *kenneth, *host_r6s]
  - path_regex: secrets/hosts/r5s\.yaml$
    key_groups:
      - age: [*hank_hackintosh, *hank_m1elite, *hank1, *hank2, *hank3, *linwhite, *fendada, *kenneth, *host_r5s]
  - path_regex: secrets/hosts/tank\.yaml$
    key_groups:
      - age: [*hank_hackintosh, *hank_m1elite, *hank1, *hank2, *hank3, *linwhite, *fendada, *kenneth, *host_tank]
  - path_regex: secrets/hosts/r5sjp\.yaml$
    key_groups:
      - age: [*hank_hackintosh, *hank_m1elite, *hank1, *hank2, *hank3, *linwhite, *fendada, *kenneth, *host_r5sjp]
  - path_regex: secrets/hosts/rpi4\.yaml$
    key_groups:
      - age: [*hank_hackintosh, *hank_m1elite, *hank1, *hank2, *hank3, *linwhite, *fendada, *kenneth, *host_rpi4]
  # shared secrets: encrypted to every admin and every known host
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *hank_hackintosh
          - *hank_m1elite
          - *hank1
          - *hank2
          - *hank3
          - *linwhite
          - *fendada
          - *kenneth
          - *host_shanghai
          - *host_h610
          - *host_r6s
          - *host_r5s
          - *host_tank
          - *host_r5sjp
          - *host_rpi4
