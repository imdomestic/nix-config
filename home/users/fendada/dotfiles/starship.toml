# ~/.config/starship.toml
right_format = """$time$battery"""
command_timeout = 1000
add_newline = true

[container]
format = '[$symbol \[$name\]]($style) '
symbol = 'έυλ'

[terraform]
format = '[ΏθΠΟΏθΤρ $version$workspace]($style) '

[battery]
full_symbol = 'ΏθΦΜ '
charging_symbol = 'έγκΎ╕Π '
discharging_symbol = 'ΏθΤΑ '

[[battery.display]]
threshold = 20
style = 'bold red'

[[battery.display]]
threshold = 50
style = 'bold yellow'

[[battery.display]]
threshold = 100
style = 'bold green'


[sudo]
style = 'bold green'
symbol = 'ΏθΣσέΑΞΏθΤ╗ '
disabled = false

[time]
disabled = false
format = 'ΏθΧβ[\[ $time \]]($style) '
time_format = '%H:%M'
utc_time_offset = '+8'
time_range = '00:00:00-24:00:00'

[os]
format = "[$symbol]($style) "
style = "bold blue"
disabled = false



[c]
format = 'via [$symbol $version]($style)'
detect_extensions = ["c", "h", "cc", "cpp", "hh", "hpp"]
symbol = "Όαη "


[cmake]
format = 'via [$symbol($version )]($style)'
symbol = 'ΌαΧ '

[directory]
read_only = " ≤░Ν╛"

[docker_context]
symbol = "ΎΝΙ "

[fossil_branch]
symbol = "ΎΡα "

[git_branch]
symbol = "ΎΡα "

[lua]
format = 'via [$symbol($version )]($style)'
symbol = 'ΏθΝβ '
#symbol = "Όαι "

[memory_usage]
